<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Letra L estilizada -->
  <rect x="14" y="12" width="9" height="36" rx="4" fill="white"/>
  <rect x="14" y="39" width="26" height="9" rx="4" fill="white"/>

  <!-- Estrela/IA no canto superior direito -->
  <g transform="translate(41, 11)">
    <!-- raios da estrela -->
    <line x1="6" y1="0" x2="6" y2="12" stroke="url(#spark)" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="0" y1="6" x2="12" y2="6" stroke="url(#spark)" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="1.8" y1="1.8" x2="10.2" y2="10.2" stroke="url(#spark)" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="10.2" y1="1.8" x2="1.8" y2="10.2" stroke="url(#spark)" stroke-width="1.6" stroke-linecap="round"/>
    <!-- centro -->
    <circle cx="6" cy="6" r="2.5" fill="url(#spark)"/>
  </g>
</svg>
